<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ | AI社員研究所</title>
<meta name="description" content="AI社員研究所へのお問い合わせページです。ツールの不具合報告、追加してほしい機能、改善要望などをGoogleフォームから受け付けています。">

<!-- favicon -->
<link rel="icon" type="image/svg+xml" href="../favicon.svg">

<!-- canonical -->
<link rel="canonical" href="https://wanwandesign0705-bot.github.io/ai-shain-lab/contact/">

<!-- OGP
     NOTE: og-image.pngが未作成のため、og:image関連タグは記載しない。
     画像を用意でき次第、トップページ・プライバシーポリシーと合わせて追加すること。 -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="AI社員研究所">
<meta property="og:title" content="お問い合わせ | AI社員研究所">
<meta property="og:description" content="AI社員研究所へのお問い合わせページです。ツールの不具合報告、追加してほしい機能、改善要望などをGoogleフォームから受け付けています。">
<meta property="og:url" content="https://wanwandesign0705-bot.github.io/ai-shain-lab/contact/">
<meta property="og:locale" content="ja_JP">

<!-- Twitter Card(画像なしのためsummaryを使用) -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="お問い合わせ | AI社員研究所">
<meta name="twitter:description" content="AI社員研究所へのお問い合わせページです。ツールの不具合報告、追加してほしい機能、改善要望などをGoogleフォームから受け付けています。">

<link rel="stylesheet" href="../common/css/reset.css">
<link rel="stylesheet" href="../common/css/variables.css">
<link rel="stylesheet" href="../common/css/base.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="header__inner">
      <span class="header__mark" aria-hidden="true">研</span>
      <p class="header__title">AI社員研究所</p>
    </div>
  </header>

  <main class="main">

    <section class="contact-hero">
      <h1 class="contact-hero__title">お問い合わせ</h1>
      <p class="contact-hero__desc">
        AI社員研究所へのご意見・ご要望は、Googleフォームより受け付けています。<br>
        いただいた内容は、今後のツール改善の参考にさせていただきます。
      </p>
    </section>

    <section class="card contact-section" aria-labelledby="h-examples">
      <h2 id="h-examples" class="contact-section__heading">こんな内容でお気軽にどうぞ</h2>
      <ul class="contact-examples">
        <li class="contact-examples__item">
          <span class="contact-examples__icon" aria-hidden="true">🐛</span>
          <span class="contact-examples__text">ツールの不具合</span>
        </li>
        <li class="contact-examples__item">
          <span class="contact-examples__icon" aria-hidden="true">✨</span>
          <span class="contact-examples__text">追加してほしい機能</span>
        </li>
        <li class="contact-examples__item">
          <span class="contact-examples__icon" aria-hidden="true">💡</span>
          <span class="contact-examples__text">改善要望</span>
        </li>
        <li class="contact-examples__item">
          <span class="contact-examples__icon" aria-hidden="true">✉️</span>
          <span class="contact-examples__text">その他のお問い合わせ</span>
        </li>
      </ul>
    </section>

    <section class="card contact-section contact-section--cta" aria-labelledby="h-form">
      <h2 id="h-form" class="contact-section__heading">お問い合わせフォーム</h2>
      <p class="contact-section__text">
        下のボタンから、Googleフォームが別タブで開きます。
      </p>
      <a
        class="contact-form-btn"
        href="https://docs.google.com/forms/d/e/1FAIpQLSc1SNQkYtRziqp5X3JMiaGyQdNlJ5aKV_se4zI4MFwvjAEiKw/viewform?usp=publish-editor"
        target="_blank"
        rel="noopener noreferrer"
      >
        お問い合わせフォームを開く ↗
      </a>
    </section>

  </main>

  <footer class="footer">
    <p class="footer__back">
      <a href="../" class="back-link">← トップページへ戻る</a>
    </p>
    <p class="footer__copyright">&copy; AI社員研究所</p>
  </footer>

</body>
</html>
